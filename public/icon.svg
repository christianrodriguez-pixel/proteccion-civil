<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- BG: warm guindo, Apple-style directional light (top-light → bottom-dark) -->
    <linearGradient id="bg" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0%" stop-color="#D42D50"/>
      <stop offset="40%" stop-color="#AB1738"/>
      <stop offset="100%" stop-color="#6A0B20"/>
    </linearGradient>

    <!-- Shield body: slightly lighter for layered separation -->
    <linearGradient id="sf" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0%" stop-color="#C72446"/>
      <stop offset="55%" stop-color="#A81536"/>
      <stop offset="100%" stop-color="#7E0F29"/>
    </linearGradient>

    <!-- Gold: rich institutional dorado -->
    <linearGradient id="au" x1=".2" y1="0" x2=".9" y2="1">
      <stop offset="0%" stop-color="#EDD49C"/>
      <stop offset="40%" stop-color="#D4A95A"/>
      <stop offset="100%" stop-color="#B08542"/>
    </linearGradient>

    <!-- Top glow on shield for glass highlight -->
    <linearGradient id="glow" x1=".5" y1="0" x2=".5" y2=".6">
      <stop offset="0%" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Vignette for depth -->
    <radialGradient id="vig" cx=".5" cy=".38" r=".68">
      <stop offset="0%" stop-color="rgba(255,255,255,0.02)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
    </radialGradient>
  </defs>

  <!-- ============ BACKGROUND (full bleed, no mask) ============ -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#vig)"/>

  <!-- Subtle top-left warm bloom for glass interaction -->
  <ellipse cx="380" cy="280" rx="360" ry="280" fill="rgba(212,169,90,0.04)"/>

  <!-- ============ SHIELD — bold, rounded, centered ============ -->
  <!-- 18% margin sides, 15% top, 20% bottom for breathing room -->
  <path
    d="M512 150
       L735 244
       C740 246, 744 252, 744 258
       L744 490
       C744 590, 696 670, 632 722
       C580 766, 530 798, 512 808
       C494 798, 444 766, 392 722
       C328 670, 280 590, 280 490
       L280 258
       C280 252, 284 246, 289 244
       Z"
    fill="url(#sf)"
    stroke="url(#au)"
    stroke-width="8"
    stroke-linejoin="round"
  />

  <!-- Shield inner highlight — glass specular -->
  <path
    d="M512 172
       L724 260 724 488
       C724 582, 680 656, 620 706
       C570 750, 526 778, 512 788
       C498 778, 454 750, 404 706
       C344 656, 300 582, 300 488
       L300 260Z"
    fill="url(#glow)"
  />

  <!-- ============ GOLD DIVIDER — robust bar ============ -->
  <rect x="374" y="540" width="276" height="5" rx="2.5" fill="url(#au)" opacity="0.5"/>

  <!-- ============ "PC" MONOGRAM — large, white, bold ============ -->
  <text
    x="512"
    y="502"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="system-ui, -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="260"
    fill="#FFFFFF"
    letter-spacing="6"
    opacity="0.97"
  >PC</text>

  <!-- ============ STAR — clean, larger, below divider ============ -->
  <path
    d="M512 590
       L526 632 572 632 536 660 548 702 512 674 476 702 488 660 452 632 498 632Z"
    fill="url(#au)"
    opacity="0.75"
  />
</svg>
